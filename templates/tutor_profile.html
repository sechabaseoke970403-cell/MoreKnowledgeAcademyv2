<!DOCTYPE html>
<html>

<head>

    <title>Complete Tutor Profile</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<nav>

    <div class="logo">
        MoreKnowledgeAcademy
    </div>

</nav>

<div class="application">

    <h1>Complete Your Tutor Profile</h1>

    <form method="POST" enctype="multipart/form-data">

        <label>Profile Photo</label>

        {% if tutor.profile_photo %}
            <img src="{{ url_for('uploaded_file', folder='photos', filename=tutor.profile_photo) }}"
                 class="tutorPhoto">
        {% endif %}

        <input type="file" name="photo">

        <label>Bio</label>
        <textarea name="bio" rows="6">{{ tutor.bio or "" }}</textarea>

        <label>Province</label>
        <input type="text"
               name="province"
               value="{{ tutor.province or '' }}"
               required>

        <label>City</label>
        <input type="text"
               name="city"
               value="{{ tutor.city or '' }}"
               required>

        <label>Teaching Mode</label>

        <select name="teaching_mode" required>

            <option value="">Select Teaching Mode</option>

            <option value="Online"
            {% if tutor.teaching_mode=="Online" %}selected{% endif %}>
            Online
            </option>

            <option value="Physical"
            {% if tutor.teaching_mode=="Physical" %}selected{% endif %}>
            Physical
            </option>

            <option value="Both"
            {% if tutor.teaching_mode=="Both" %}selected{% endif %}>
            Both
            </option>

        </select>

        <label>Hourly Rate (R)</label>

        <input type="number"
               step="0.01"
               name="hourly_rate"
               value="{{ tutor.hourly_rate or '' }}"
               required>

        <label>Grades You Teach</label>

        <input type="text"
               name="grades"
               value="{{ tutor.grades or '' }}">

        <label>Languages</label>

        <input type="text"
               name="languages"
               value="{{ tutor.languages or '' }}">

        <label>Availability</label>

        <textarea name="availability" rows="4">{{ tutor.availability or "" }}</textarea>

        <br><br>

        <button type="submit">
            Save Profile
        </button>

    </form>

</div>

</body>

</html>
