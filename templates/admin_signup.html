<!DOCTYPE html>
<html>

<head>

<title>Admin Sign Up</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<nav>

<div class="logo">MoreKnowledgeAcademy</div>

</nav>

<div class="application">

<h1>Create Administrator Account</h1>

<form action="/admin/signup" method="POST">

<input
type="text"
name="full_name"
placeholder="Full Name"
required>

<input
type="email"
name="email"
placeholder="Email"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">

Create Account

</button>

</form>

<br>

<a href="/admin">

Already have an account? Login

</a>

</div>

</body>

</html>
