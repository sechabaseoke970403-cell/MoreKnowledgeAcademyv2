<!DOCTYPE html>
<html>

<head>

<title>Student Signup</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="application">

<h1>Create Student Account</h1>

<form method="POST">

<input
type="text"
name="full_name"
placeholder="Full Name"
required>

<input
type="email"
name="email"
placeholder="Email"
required>

<input
type="text"
name="phone"
placeholder="Phone">

<input
type="password"
name="password"
placeholder="Password"
required>

<button>Create Account</button>

</form>

</div>

</body>

</html>
