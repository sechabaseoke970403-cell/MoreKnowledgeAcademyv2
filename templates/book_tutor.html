<!DOCTYPE html>
<html>

<head>

    <title>Book Lesson</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="application">

    <h1>Book {{ tutor.full_name }}</h1>

    <h3>{{ tutor.subject }}</h3>

    {% if error %}

    <div style="background:#ffdddd;color:red;padding:15px;margin-bottom:20px;border-radius:8px;">

        {{ error }}

    </div>

    {% endif %}

    <h3>Tutor Availability</h3>

    <table border="1" cellpadding="8">

        <tr>

            <th>Day</th>
            <th>From</th>
            <th>To</th>

        </tr>

        {% for slot in availability %}

        <tr>

            <td>{{ slot.day }}</td>
            <td>{{ slot.start_time }}</td>
            <td>{{ slot.end_time }}</td>

        </tr>

        {% endfor %}

    </table>

    <br>
<form method="POST">

    <label>Select Available Slot</label>

    <select name="slot" required>

        <option value="">Select Slot</option>

        {% for slot in availability %}

        <option value="{{ slot.day }}|{{ slot.start_time }}">

            {{ slot.day }} -
            {{ slot.start_time }} to
            {{ slot.end_time }}

        </option>

        {% endfor %}

    </select>

    <label>Message</label>

    <textarea
        name="message"
        rows="5"
        placeholder="Optional message to the tutor"></textarea>

    <button type="submit">

        Continue to Payment

    </button>

</form>

</div>

</body>

</html>
