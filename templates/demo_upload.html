<!DOCTYPE html>
<html>

<head>

<title>Upload Demo Lesson</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<nav>

<div class="logo">

MoreKnowledgeAcademy

</div>

</nav>

<div class="application">

<h1>Upload Demo Lesson</h1>

<p>

<strong>{{ tutor.full_name }}</strong>

</p>

<p>

Subject:
<strong>{{ tutor.subject }}</strong>

</p>

<form method="POST">

<label>YouTube Video Link</label>

<input
type="url"
name="demo_video_link"
placeholder="https://www.youtube.com/..."
required>

<button type="submit">

Submit Demo Lesson

</button>

</form>

</div>

</body>

</html>
