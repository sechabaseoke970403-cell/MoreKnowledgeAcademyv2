<!DOCTYPE html>
<html>

<head>

<title>Pay Lesson</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="application">

<h2>Complete Payment</h2>

<p>

Tutor:
<b>{{ booking.full_name }}</b>

</p>

<p>

Amount:
<b>R{{ booking.hourly_rate }}</b>

</p>

<form action="{{ payfast_url }}" method="POST">

<input
type="hidden"
name="merchant_id"
value="{{ merchant_id }}">

<input
type="hidden"
name="merchant_key"
value="{{ merchant_key }}">

<input
type="hidden"
name="amount"
value="{{ booking.hourly_rate }}">

<input
type="hidden"
name="item_name"
value="Lesson Booking">

<input
type="hidden"
name="custom_int1"
value="{{ booking.id }}">

<input
type="hidden"
name="return_url"
value="https://YOUR_RENDER_URL/payment-success/{{ booking.id }}">

<input
type="hidden"
name="cancel_url"
value="https://YOUR_RENDER_URL/payment-cancel">

<input
type="hidden"
name="notify_url"
value="https://YOUR_RENDER_URL/payfast-itn">

<button type="submit">

Pay Now

</button>

</form>

</div>

</body>

</html>
