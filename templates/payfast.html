<!DOCTYPE html>
<html>

<head>

    <title>Complete Payment</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="application">

    <h2>Complete Payment</h2>

    <p><b>Tutor:</b> {{ booking.full_name }}</p>

    <p><b>Amount:</b> R{{ booking.hourly_rate }}</p>

    <form
        action="{{ PAYFAST_URL }}"
        method="post">

        <input type="hidden"
               name="merchant_id"
               value="{{ PAYFAST_MERCHANT_ID }}">

        <input type="hidden"
               name="merchant_key"
               value="{{ PAYFAST_MERCHANT_KEY }}">

        <input type="hidden"
               name="amount"
               value="{{ booking.hourly_rate }}">

        <input type="hidden"
               name="item_name"
               value="Lesson Booking">

        <input type="hidden"
               name="custom_int1"
               value="{{ booking.id }}">

        <input type="hidden"
               name="return_url"
               value="https://moreknowledgeacademyv2.onrender.com/payment-success?booking={{ booking.id }}">

        <input type="hidden"
               name="cancel_url"
               value="https://moreknowledgeacademyv2.onrender.com/payment-cancel">

        <input type="hidden"
               name="notify_url"
               value="https://moreknowledgeacademyv2.onrender.com/payfast-itn">

        <button type="submit">

            Pay Securely with PayFast

        </button>

    </form>

</div>

</body>

</html>
